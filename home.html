<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sketch_apr28a | Arduino IDE 2.3.7</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* =========================
       WINDOW TITLE BAR
    ========================= */
    .window-bar {
      height: 30px;
      background: #e8e2db;
      border-bottom: 1px solid #d6d1ca;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 0 4px;
      flex-shrink: 0;
    }

    .window-left {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #222;
      font-size: 13px;
    }

    .app-icon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: #2aa6a6;
      position: relative;
      flex-shrink: 0;
    }

    .app-icon::before {
      content: "∞";
      position: absolute;
      top: -1px;
      left: 2px;
      font-size: 12px;
      color: #fff;
      font-weight: 600;
      line-height: 16px;
    }

    .window-controls {
      display: flex;
      align-items: center;
      gap: 18px;
      color: #333;
      font-size: 14px;
      user-select: none;
    }

    .window-controls span {
      cursor: pointer;
    }

    /* =========================
       MENU BAR
    ========================= */
    .menu-bar {
      height: 24px;
      background: #ffffff;
      border-bottom: 1px solid #e1e1e1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 6px;
      flex-shrink: 0;
    }

    .menu-item {
      font-size: 13px;
      color: #1f1f1f;
      cursor: pointer;
      user-select: none;
    }

    .menu-item:hover {
      color: #006d70;
    }

    /* =========================
       TOP TOOLBAR
    ========================= */
    .toolbar {
      height: 46px;
      background: #006d70;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      flex-shrink: 0;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .circle-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #7cc9c8;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0c6466;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
    }

    .circle-btn:hover {
      background: #92d8d6;
    }

    .board-select {
      width: 255px;
      height: 32px;
      background: #ffffff;
      margin-left: 8px;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      color: #5f5f5f;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 18px;
      color: #dff6f5;
      font-size: 20px;
      user-select: none;
    }

    .toolbar-right span {
      cursor: pointer;
    }

    /* =========================
       MAIN APP AREA
    ========================= */
    .app {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* =========================
       LEFT SIDEBAR
    ========================= */
    .sidebar {
      width: 52px;
      background: #dfe5e4;
      border-right: 1px solid #cfd6d5;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      flex-shrink: 0;
    }

    .side-btn {
      width: 100%;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }

    .side-btn svg {
      width: 28px;
      height: 28px;
      stroke: #a0aaaa;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .side-btn:hover svg {
      stroke: #7f8b8b;
    }

    .bottom-user {
      position: absolute;
      bottom: 10px;
      width: 100%;
    }

    /* =========================
       EDITOR SIDE
    ========================= */
    .editor-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: #ffffff;
    }

    .tab-bar {
      height: 34px;
      background: #ffffff;
      border-bottom: 1px solid #e6e6e6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      flex-shrink: 0;
    }

    .tab-title {
      font-size: 14px;
      color: #444;
    }

    .tab-dots {
      font-size: 22px;
      color: #666;
      line-height: 1;
      user-select: none;
    }

    .editor-area {
      flex: 1;
      display: flex;
      min-height: 0;
      background: #ffffff;
    }

    .line-numbers {
      width: 74px;
      background: #ffffff;
      color: #2f78b5;
      text-align: right;
      padding-right: 18px;
      padding-top: 8px;
      font-size: 14px;
      line-height: 1.5;
      user-select: none;
      white-space: pre;
      flex-shrink: 0;
    }

    .code-panel {
      flex: 1;
      background: #f8f8f8;
      border-left: 1px solid #efefef;
      position: relative;
      padding-top: 8px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 14px;
      line-height: 1.5;
      color: #333;
      white-space: pre;
      overflow: auto;
    }

    .cursor-line {
      position: absolute;
      top: 8px;
      left: 0;
      width: 2px;
      height: 20px;
      background: #18a4a7;
    }

    .code-content {
      padding-left: 0;
      min-width: max-content;
    }

    .kw {
      color: #0b9db0;
    }

    .comment {
      color: #95a2a6;
    }

    .orange {
      color: #d68033;
    }

    /* =========================
       STATUS BAR
    ========================= */
    .status-bar {
      height: 28px;
      background: #006d70;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 18px;
      padding: 0 12px;
      font-size: 12px;
      flex-shrink: 0;
    }

    .status-bar span {
      display: flex;
      align-items: center;
      gap: 5px;
      user-select: none;
    }

    /* =========================
       SIMPLE POPUP
    ========================= */
    .popup {
      position: fixed;
      top: 80px;
      right: 20px;
      background: #ffffff;
      border: 1px solid #cfd6d5;
      box-shadow: 0 6px 16px rgba(0,0,0,0.14);
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 13px;
      color: #333;
      display: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <!-- WINDOW TITLE BAR -->
  <div class="window-bar">
    <div class="window-left">
      <div class="app-icon"></div>

  <!-- MENU BAR -->
  <div class="menu-bar">
    <div class="menu-item" onclick="location.href='file.html'">File</div>

      <span onclick="showPopup('More clicked')">⋯</span>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="app">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <!-- Folder icon goes to file.html -->

          <circle cx="12" cy="12" r="8"></circle>

      <div class="side-btn" onclick="showPopup('Search clicked')">
        <svg viewBox="0 0 24 24">
          <circle cx="10" cy="10" r="6"></circle>
          <path d="M15 15l5 5"></path>
        </svg>

      <div class="bottom-user">
        <div class="side-btn" onclick="showPopup('Profile clicked')">
          <svg viewBox="0 0 24 24">

    </div>

    <!-- EDITOR -->
    <div class="editor-shell">
      <div class="tab-bar">
        <div class="tab-title">sketch_apr28a.ino</div>

  </div>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span>Ln 1, Col 1</span>
    <span>✕ No board selected</span>
    <span>🔔</span>
  </div>

  <!-- POPUP -->
  <div class="popup" id="popup"></div>

  <script>
    function showPopup(message) {
      const popup = document.getElementById("popup");
      popup.textContent = message;
      popup.style.display = "block";

      clearTimeout(window.popupTimer);
      window.popupTimer = setTimeout(() => {
        popup.style.display = "none";
      }, 1500);
    }
  </script>

</body>
</html>
